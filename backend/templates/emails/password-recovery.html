<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar sua senha</title>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #F6F7F9; -webkit-font-smoothing: antialiased; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #F6F7F9; padding: 40px 0; }
        .main { background-color: #FFFFFF; width: 100%; max-width: 600px; margin: 0 auto; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { padding: 30px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; color: #56AB2F; letter-spacing: -0.5px; text-decoration: none; }
        .content { padding: 0 40px 40px; text-align: center; }
        .title { font-size: 24px; font-weight: 700; color: #1A1C1E; margin: 0 0 16px; }
        .text { font-size: 16px; line-height: 1.6; color: #718096; margin: 0 0 32px; }
        .button-container { margin-bottom: 32px; }
        .button { display: inline-block; background-color: #56AB2F; color: #FFFFFF !important; padding: 18px 36px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 16px; box-shadow: 0 10px 20px rgba(86, 171, 47, 0.3); }
        .footer { background-color: #F6F7F9; padding: 30px; text-align: center; font-size: 12px; color: #A0AEC0; line-height: 1.5; }
        @media screen and (max-width: 480px) { .content { padding: 0 25px 30px; } .title { font-size: 20px; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="main">
            <div class="header">
                <a href="#" class="logo">ProFit</a>
            </div>
            <div class="content">
                <h1 class="title">Esqueceu sua senha? 🔐</h1>
                <p class="text">Não se preocupe, acontece com os melhores. Clique no botão abaixo para redefinir sua senha com segurança.</p>
                <div class="button-container">
                    <a href="{{reset_link}}" class="button">Redefinir Senha</a>
                </div>
            </div>
            <div class="footer">
                <strong>ProFit</strong> &copy; 2026<br>
                Por sua segurança, este link expira em 30 minutos.<br>
                Se você não solicitou este e-mail, por favor ignore-o.
            </div>
        </div>
    </div>
</body>
</html>
